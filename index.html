      </div>
      <div className="card">
        <div className="card-hd"><span className="card-title">My Uploaded Studies</span><button className="btn btn-gold btn-sm" onClick={()=>setShowUpload(true)}><Ico.up/> Upload New</button></div>
        {loading?<div style={{textAlign:'center',padding:'30px',color:'var(--muted)'}}>Loading…</div>
        :myStudies.length===0?<div className="empty" style={{padding:'36px 20px'}}><div className="empty-ico">📄</div><h3>No studies yet</h3><p>Upload your first research study.</p><button className="btn btn-ink mt12" onClick={()=>setShowUpload(true)}>Upload Study</button></div>
        :<div className="tw"><table>
          <thead><tr><th>Title</th><th>Categories</th><th>Year</th><th>Views</th><th>Downloads</th><th>Uploaded</th></tr></thead>
          <tbody>{myStudies.map(s=><tr key={s.id}>
            <td style={{maxWidth:230}}><div style={{fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.title}</div></td>
            <td><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{(s.categories||[]).map(c=><span key={c} className="badge" style={{background:'var(--gold-bg)',color:'var(--gold)',fontSize:'0.66rem'}}>{c}</span>)}</div></td>
            <td>{s.year}</td><td>{s.viewCount||0}</td><td>{s.downloadCount||0}</td><td>{fmtDate(s.createdAt)}</td>
          </tr>)}</tbody>
        </table></div>}
      </div>
      {showUpload&&<UploadModal onClose={()=>setShowUpload(false)} currentUser={currentUser} cats={cats} onUpload={()=>{load();setShowUpload(false);}}/>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ══════════════════════════════════════════════════════════════════
function AdminDash() {
  const [stats,setStats]=useState(null);
  const [pending,setPending]=useState([]);
  const [recent,setRecent]=useState([]);

  const load=async()=>{
    const [s,p,r]=await Promise.all([API.getStats(),API.getUsers({role:'student',status:'pending'}),API.getStudies({status:'',perPage:5})]);
    setStats(s);setPending(p);setRecent(r.data);
  };
  useEffect(()=>{load();},[]);

  const upd=async(id,status)=>{await API.updateUserStatus(id,status);toast.ok(`Account ${status}.`);load();};

  if(!stats)return <div style={{textAlign:'center',padding:'50px',color:'var(--muted)'}}>Loading dashboard…</div>;

  return (
    <div>
      <div style={{marginBottom:22}}><h2 style={{fontFamily:'var(--font-display)',fontSize:'1.45rem',marginBottom:3}}>Admin Dashboard</h2><p className="muted">System overview and management</p></div>
      <div className="stats">
        <div className="stat gold"><div className="stat-lbl">Total Students</div><div className="stat-val">{stats.totalStudents}</div><div className="stat-sub">{stats.approvedStudents} approved</div></div>
        <div className="stat red"><div className="stat-lbl">Pending</div><div className="stat-val">{stats.pendingStudents}</div><div className="stat-sub">Awaiting review</div></div>
        <div className="stat teal"><div className="stat-lbl">Studies</div><div className="stat-val">{stats.totalStudies}</div><div className="stat-sub">In repository</div></div>
        <div className="stat blue"><div className="stat-lbl">Total Views</div><div className="stat-val">{stats.totalViews}</div><div className="stat-sub">All time</div></div>
        <div className="stat pur"><div className="stat-lbl">Downloads</div><div className="stat-val">{stats.totalDownloads}</div><div className="stat-sub">All time</div></div>
      </div>
      {pending.length>0&&<div className="card" style={{marginBottom:18,borderLeft:'4px solid var(--gold)'}}>
        <div className="card-hd"><span className="card-title">⏳ Pending Approvals</span><span className="badge badge-pend">{pending.length} waiting</span></div>
        <div className="tw"><table>
          <thead><tr><th>Name</th><th>Email</th><th>School</th><th>Registered</th><th>Actions</th></tr></thead>
          <tbody>{pending.map(u=><tr key={u.id}>
            <td><div style={{fontWeight:500}}>{u.name}</div></td>
            <td style={{fontSize:'0.8rem'}}>{u.email}</td><td>{u.institution||'—'}</td><td>{fmtDate(u.createdAt)}</td>
            <td><div style={{display:'flex',gap:6}}><button className="btn btn-grn btn-sm" onClick={()=>upd(u.id,'approved')}><Ico.chk/> Approve</button><button className="btn btn-red btn-sm" onClick={()=>upd(u.id,'rejected')}><Ico.X/> Reject</button></div></td>
          </tr>)}</tbody>
        </table></div>
      </div>}
      <div className="card">
        <div className="card-hd"><span className="card-title">Recent Uploads</span></div>
        {recent.length===0?<p className="muted">No studies yet.</p>
        :<div className="tw"><table>
          <thead><tr><th>Title</th><th>Authors</th><th>Categories</th><th>Views</th><th>Date</th></tr></thead>
          <tbody>{recent.map(s=><tr key={s.id}>
            <td style={{maxWidth:200}}><div style={{fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.title}</div></td>
            <td style={{fontSize:'0.8rem'}}>{(s.authors||[]).join(', ')}</td>
            <td><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{(s.categories||[]).map(c=><span key={c} className="badge" style={{background:'var(--gold-bg)',color:'var(--gold)',fontSize:'0.65rem'}}>{c}</span>)}</div></td>
            <td>{s.viewCount||0}</td><td>{fmtDate(s.createdAt)}</td>
          </tr>)}</tbody>
        </table></div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
//  ADMIN USERS
// ══════════════════════════════════════════════════════════════════
function AdminUsers() {
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [students,setStudents]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=async()=>{setLoading(true);const res=await API.getUsers({role:'student',status:filter==='all'?'':filter,search});setStudents(res);setLoading(false);};
  useEffect(()=>{load();},[filter,search]);

  const upd=async(id,status)=>{await API.updateUserStatus(id,status);toast.ok(`Account ${status}.`);load();};
  const del=async id=>{if(!confirm('Delete this user and all their studies?'))return;await API.deleteUser(id);toast.ok('User deleted.');load();};

  return (
    <div>
      <div style={{marginBottom:18}}><h2 className="sec-title" style={{marginBottom:1}}>User Management</h2><p className="muted">{students.length} students</p></div>
      <div className="fb" style={{marginBottom:18}}>
        <div className="sb" style={{flex:1,minWidth:200}}><Ico.search/><input placeholder="Search by name, email, or school…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <select value={filter} onChange={e=>setFilter(e.target.value)} style={{width:'auto',padding:'9px 13px'}}>
          <option value="all">All Status</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option>
        </select>
      </div>
      <div className="card">
        {loading?<div style={{textAlign:'center',padding:'30px',color:'var(--muted)'}}>Loading…</div>
        :students.length===0?<div className="empty" style={{padding:'36px 0'}}><div className="empty-ico">👤</div><h3>No users found</h3></div>
        :<div className="tw"><table>
          <thead><tr><th>Student</th><th>School / Section</th><th>Status</th><th>Uploads</th><th>Registered</th><th>Actions</th></tr></thead>
          <tbody>{students.map(u=><tr key={u.id}>
            <td><div style={{display:'flex',alignItems:'center',gap:9}}><div className="avatar" style={{width:30,height:30,fontSize:'0.72rem',background:'var(--ink-3)'}}>{initials(u.name)}</div><div><div style={{fontWeight:500}}>{u.name}</div><div style={{fontSize:'0.72rem',color:'var(--muted)'}}>{u.email}</div></div></div></td>
            <td>{u.institution||'—'}<br/><span style={{fontSize:'0.72rem',color:'var(--muted)'}}>{u.department}</span></td>
            <td><span className={`badge badge-${u.status==='approved'?'appr':u.status==='rejected'?'rej':'pend'}`}>{u.status}</span></td>
            <td>{u.uploadCount||0}</td><td>{fmtDate(u.createdAt)}</td>
            <td><div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
              {u.status!=='approved'&&<button className="btn btn-grn btn-sm" onClick={()=>upd(u.id,'approved')}><Ico.chk/></button>}
              {u.status!=='rejected'&&<button className="btn btn-ol btn-sm" onClick={()=>upd(u.id,'rejected')}>Reject</button>}
              <button className="btn btn-red btn-sm" onClick={()=>del(u.id)}><Ico.trash/></button>
            </div></td>
          </tr>)}</tbody>
        </table></div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
//  ADMIN STUDIES
// ══════════════════════════════════════════════════════════════════
function AdminStudies() {
  const [search,setSearch]=useState('');
  const [studies,setStudies]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=async()=>{setLoading(true);const res=await API.getStudies({search,status:'',perPage:100});setStudies(res.data);setLoading(false);};
  useEffect(()=>{load();},[search]);

  const del=async id=>{if(!confirm('Delete this study?'))return;await API.deleteStudy(id);toast.ok('Study deleted.');load();};

  return (
    <div>
      <div style={{marginBottom:18}}><h2 className="sec-title" style={{marginBottom:1}}>Manage Studies</h2><p className="muted">{studies.length} studies</p></div>
      <div className="sb" style={{marginBottom:18}}><Ico.search/><input placeholder="Search studies…" value={search} onChange={e=>setSearch(e.target.value)}/></div>
      <div className="card">
        {loading?<div style={{textAlign:'center',padding:'30px',color:'var(--muted)'}}>Loading…</div>
        :studies.length===0?<div className="empty" style={{padding:'36px 0'}}><div className="empty-ico">📚</div><h3>No studies yet</h3></div>
        :<div className="tw"><table>
          <thead><tr><th>Title</th><th>Authors</th><th>Categories</th><th>Uploader</th><th>Views</th><th>Dls</th><th>Date</th><th></th></tr></thead>
          <tbody>{studies.map(s=><tr key={s.id}>
            <td style={{maxWidth:190}}><div style={{fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.title}</div></td>
            <td style={{fontSize:'0.78rem'}}>{(s.authors||[]).join(', ')}</td>
            <td><div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{(s.categories||[]).map(c=><span key={c} className="badge" style={{background:'var(--gold-bg)',color:'var(--gold)',fontSize:'0.63rem'}}>{c}</span>)}</div></td>
            <td style={{fontSize:'0.82rem'}}>{s.uploadedByName}</td>
            <td>{s.viewCount||0}</td><td>{s.downloadCount||0}</td><td>{fmtDate(s.createdAt)}</td>
            <td><button className="btn btn-red btn-sm" onClick={()=>del(s.id)}><Ico.trash/></button></td>
          </tr>)}</tbody>
        </table></div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
//  ADMIN CATEGORIES
// ══════════════════════════════════════════════════════════════════
function AdminCats() {
  const [cats,setCats]=useState([]);
  const [newCat,setNewCat]=useState('');
  const [editIdx,setEditIdx]=useState(null);
  const [editVal,setEditVal]=useState('');
  const [loading,setLoading]=useState(true);

  useEffect(()=>{API.getCategories().then(c=>{setCats(c);setLoading(false);});},[]);

  const save=async()=>{await API.setCategories(cats);toast.ok('Categories saved!');};
  const add=()=>{const t=newCat.trim();if(!t)return;if(cats.includes(t)){toast.err('Already exists.');return;}setCats([...cats,t]);setNewCat('');};
  const rem=i=>{if(cats.length<=1){toast.err('Need at least one category.');return;}setCats(cats.filter((_,idx)=>idx!==i));};
  const startEdit=i=>{setEditIdx(i);setEditVal(cats[i]);};
  const saveEdit=()=>{if(!editVal.trim())return;setCats(cats.map((c,i)=>i===editIdx?editVal.trim():c));setEditIdx(null);};

  if(loading)return <div style={{textAlign:'center',padding:'40px',color:'var(--muted)'}}>Loading…</div>;

  return (
    <div>
      <div style={{marginBottom:18}}><h2 className="sec-title" style={{marginBottom:1}}>Manage Categories</h2><p className="muted">Students can select 1–2 per upload.</p></div>
      <div className="card" style={{marginBottom:18}}>
        <div className="card-hd"><span className="card-title">Current Categories ({cats.length})</span></div>
        {cats.map((cat,idx)=>(
          <div key={idx} className="cm-item">
            {editIdx===idx?(<><input className="cm-in" value={editVal} onChange={e=>setEditVal(e.target.value)} onKeyDown={e=>e.key==='Enter'&&saveEdit()} autoFocus/><button className="btn btn-grn btn-sm" onClick={saveEdit}><Ico.chk/> Save</button><button className="btn btn-ol btn-sm" onClick={()=>setEditIdx(null)}>Cancel</button></>)
            :(<><span className="cm-name">{cat}</span><button className="btn btn-ol btn-sm" onClick={()=>startEdit(idx)}><Ico.edit/> Edit</button><button className="btn btn-red btn-sm" onClick={()=>rem(idx)}><Ico.trash/></button></>)}
          </div>
        ))}
        <div style={{display:'flex',gap:9,marginTop:14}}><input placeholder="Add new category…" value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==='Enter'&&add()} style={{flex:1}}/><button className="btn btn-ink" onClick={add}><Ico.plus/> Add</button></div>
      </div>
      <div style={{display:'flex',justifyContent:'flex-end'}}><button className="btn btn-gold" onClick={save}>Save All Changes</button></div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
//  SIDEBAR
// ══════════════════════════════════════════════════════════════════
function Sidebar({ currentUser, activeTab, setActiveTab, onLogout, pendingCount=0 }) {
  const isAdmin=currentUser.role==='admin';
  const adminNav=[
    {id:'dashboard',label:'Dashboard',icon:<Ico.home/>},
    {id:'users',label:'Users',icon:<Ico.users/>,badge:pendingCount||null},
    {id:'studies-admin',label:'All Studies',icon:<Ico.book/>},
    {id:'categories',label:'Categories',icon:<Ico.tag/>},
    {id:'repository',label:'Repository',icon:<Ico.search/>},
    {id:'chatbot',label:'AI Assistant',icon:<Ico.bot/>},
  ];
  const studentNav=[
    {id:'dashboard',label:'Dashboard',icon:<Ico.home/>},
    {id:'repository',label:'Browse Studies',icon:<Ico.book/>},
    {id:'chatbot',label:'AI Assistant',icon:<Ico.bot/>},
  ];
  return (
    <nav className="sidebar">
      <div className="sidebar-logo">
        <h1>SABNAHIS <span>STE Research Portal</span></h1>
        <p>Institutional Research Repository</p>
      </div>
      <div className="sidebar-nav">
        <div className="nav-label">{isAdmin?'Administration':'Navigation'}</div>
        {(isAdmin?adminNav:studentNav).map(item=>(
          <button key={item.id} className={`nav-item ${activeTab===item.id?'active':''}`} onClick={()=>setActiveTab(item.id)}>
            {item.icon}{item.label}{item.badge&&<span className="nav-badge">{item.badge}</span>}
          </button>
        ))}
      </div>
      <div className="sidebar-footer">
        <div className="user-chip">
          <div className="avatar">{initials(currentUser.name)}</div>
          <div className="user-info"><strong>{currentUser.name}</strong><span>{currentUser.role}</span></div>
        </div>
        <button style={{width:'100%',textAlign:'center',marginTop:8,padding:'7px',borderRadius:6,background:'none',border:'none',color:'rgba(255,255,255,0.38)',cursor:'pointer',fontSize:'0.78rem',transition:'color .2s'}} onMouseEnter={e=>e.target.style.color='rgba(255,255,255,0.7)'} onMouseLeave={e=>e.target.style.color='rgba(255,255,255,0.38)'} onClick={onLogout}>Sign Out</button>
      </div>
    </nav>
  );
}

// ══════════════════════════════════════════════════════════════════
//  ROOT APP
// ══════════════════════════════════════════════════════════════════
function App() {
  const [currentUser,setCurrentUser]=useState(null);
  const [authChecked,setAuthChecked]=useState(false);
  const [activeTab,setActiveTab]=useState('dashboard');
  const [pendingCount,setPendingCount]=useState(0);
  const [initError,setInitError]=useState('');

  useEffect(()=>{
    let unsub=()=>{};
    try{
      unsub=auth.onAuthStateChanged(async fbUser=>{
        // If login() is handling this sign-in, skip — it will call onLogin directly.
        if(_loginInProgress){ return; }
        if(fbUser){
          try{
            const profile=await API.getProfile(fbUser.uid);
            if(profile&&(profile.status==='approved'||profile.role==='admin')){
              setCurrentUser(profile);
              if(profile.role==='admin'){
                API.getUsers({role:'student',status:'pending'}).then(p=>setPendingCount(p.length)).catch(()=>{});
              }
            } else {
              // Pending/rejected user is still Firebase-authed — sign them out silently
              await auth.signOut().catch(()=>{});
              setCurrentUser(null);
            }
          }catch(e){
            console.error('Profile load error:',e);
            await auth.signOut().catch(()=>{});
            setCurrentUser(null);
          }
        } else {
          setCurrentUser(null);
        }
        setAuthChecked(true);
      },err=>{
        console.error('Auth error:',err);
        setInitError(err.message);
        setAuthChecked(true);
      });
    }catch(e){
      console.error('Firebase init error:',e);
      setInitError(e.message);
      setAuthChecked(true);
    }
    return ()=>{try{unsub();}catch{}};
  },[]);

  const titles={dashboard:'Dashboard',users:'User Management','studies-admin':'Manage Studies',categories:'Manage Categories',repository:'Research Repository',chatbot:'AI Research Assistant'};

  // Loading screen
  if(!authChecked){
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--ink)',gap:16}}>
        <div style={{fontFamily:'var(--font-display)',fontSize:'1.3rem',color:'var(--gold)',letterSpacing:'-0.5px'}}>SABNAHIS STE Research Portal</div>
        <span className="spin" style={{width:28,height:28,border:'3px solid rgba(201,162,39,0.25)',borderTopColor:'var(--gold)'}}/>
        <p style={{color:'rgba(255,255,255,0.35)',fontSize:'0.8rem'}}>Connecting to database…</p>
      </div>
    );
  }

  // Error screen
  if(initError){
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'var(--ink)',gap:14,padding:24}}>
        <div style={{fontSize:'2rem'}}>⚠️</div>
        <div style={{fontFamily:'var(--font-display)',fontSize:'1.1rem',color:'#fff'}}>Connection Error</div>
        <div style={{background:'rgba(255,255,255,0.07)',borderRadius:8,padding:'12px 18px',maxWidth:480,color:'rgba(255,255,255,0.6)',fontSize:'0.85rem',fontFamily:'var(--font-mono)',wordBreak:'break-all'}}>{initError}</div>
        <p style={{color:'rgba(255,255,255,0.4)',fontSize:'0.82rem',textAlign:'center',maxWidth:400}}>Check that your Firebase project is active and the domain is authorized in Firebase Console → Authentication → Settings → Authorized domains.</p>
        <button className="btn btn-gold" onClick={()=>window.location.reload()}>Reload Page</button>
      </div>
    );
  }

  // Auth screen
  if(!currentUser){
    return (
      <ToastProvider>
        <AuthPage onLogin={user=>{
          _loginInProgress=false;   // login complete, reset flag
          setCurrentUser(user);
          setAuthChecked(true);
          if(user.role==='admin') API.getUsers({role:'student',status:'pending'}).then(p=>setPendingCount(p.length)).catch(()=>{});
        }}/>
      </ToastProvider>
    );
  }

  const isAdmin=currentUser.role==='admin';

  const renderPage=()=>{
    switch(activeTab){
      case 'dashboard':     return isAdmin?<AdminDash/>:<StudentDash currentUser={currentUser}/>;
      case 'users':         return isAdmin?<AdminUsers/>:null;
      case 'studies-admin': return isAdmin?<AdminStudies/>:null;
      case 'categories':    return isAdmin?<AdminCats/>:null;
      case 'repository':    return <StudiesPage currentUser={currentUser}/>;
      case 'chatbot':       return <ChatPage currentUser={currentUser}/>;
      default:              return null;
    }
  };

  return (
    <ToastProvider>
      <div className="app-shell">
        <Sidebar currentUser={currentUser} activeTab={activeTab} setActiveTab={setActiveTab} pendingCount={pendingCount}
          onLogout={async()=>{await API.logout();setCurrentUser(null);setActiveTab('dashboard');}}/>
        <div className="main-content">
          <div className="topbar">
            <span className="topbar-title">{titles[activeTab]||'Dashboard'}</span>
            <span className={`badge ${isAdmin?'badge-admin':'badge-appr'}`}>{isAdmin?'⚙ Admin':'🎓 Student'}</span>
          </div>
          <div className="page">{renderPage()}</div>
        </div>
      </div>
    </ToastProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
